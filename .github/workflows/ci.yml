name: CI
on:
  push:
    branches: [main, 'release/v*']
    tags: ['v*']
  pull_request:
    branches: [main, 'release/v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint — block reintroduction of dishonest test patterns
  # ---------------------------------------------------------------------------

  lint-no-silent-skips:
    name: Lint — no silent test skips
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject silent-skip patterns in Zig integration tests
        # The Zig test runner reports a function that catches an error,
        # logs, and bare-returns as PASSED. Block reintroduction of that
        # antipattern by failing CI when the surface markers reappear in
        # integration/zig/src/*_test.zig. The 162 historical instances
        # were converted to `try` so any new match is a regression.
        run: |
          set -e
          fail=0
          if grep -rn "skipping test\|skipping," integration/zig/src/*_test.zig 2>/dev/null; then
            echo "::error::silent-skip pattern reintroduced (catch + log + bare return reports as PASS)"
            fail=1
          fi
          if grep -rn "Could not compile.*{any}" integration/zig/src/*_test.zig 2>/dev/null; then
            echo "::error::silent compile-failure log reintroduced -- use 'try compile.compileContract(...)' instead"
            fail=1
          fi
          if grep -rn "unexpectedly succeeded" integration/zig/src/*_test.zig 2>/dev/null; then
            echo "::error::silent-pass-on-unexpected-success reintroduced -- use 'return error.TestUnexpectedResult'"
            fail=1
          fi
          exit $fail

  # ---------------------------------------------------------------------------
  # Compilers — build, unit test, upload artifacts
  # ---------------------------------------------------------------------------

  ts-compiler:
    name: TypeScript Compiler
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    env:
      # Force the cross-compiler vitest matrix to hard-fail when any of the
      # 7 toolchains is missing (instead of skipping with a warning). This
      # job installs every toolchain the matrix references.
      RUNAR_REQUIRE_ALL_COMPILERS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: compilers/go/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Rust compiler (for cross-compiler tests)
        run: cd compilers/rust && cargo build --release
      - name: Warm Go build cache (for cross-compiler tests)
        run: cd compilers/go && go build ./...
      - name: Build Zig compiler (for cross-compiler tests)
        run: cd compilers/zig && zig build -Doptimize=ReleaseSafe
      - name: Build Java compiler jar (for cross-compiler tests)
        run: cd compilers/java && gradle jar --no-daemon
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test
      - name: Example tests (TS + Sol + Move)
        run: npx vitest run examples/ts/ examples/sol/ examples/move/
      - run: pnpm run typecheck

  go-compiler:
    name: Go Compiler
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: compilers/go/go.sum
      - run: cd compilers/go && go build ./...
      - run: cd compilers/go && go build -o runar-go .
      - run: cd compilers/go && go test -race -v ./...
      - uses: actions/upload-artifact@v4
        with:
          name: runar-go
          path: compilers/go/runar-go

  rust-compiler:
    name: Rust Compiler
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd compilers/rust && cargo build --release
      - run: cd compilers/rust && cargo test
      - uses: actions/upload-artifact@v4
        with:
          name: runar-rust
          path: compilers/rust/target/release/runar-compiler-rust

  python-compiler:
    name: Python Compiler
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: cd compilers/python && python -m pytest tests/ -v

  zig-compiler:
    name: Zig Compiler
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: cd compilers/zig && zig build test
      - name: Zig conformance tests
        run: cd compilers/zig && zig build conformance
      - name: Build release binary
        # ReleaseSafe + baseline CPU: ReleaseFast was SIGILL-ing on heavier
        # conformance fixtures on the conformance runner (different ubuntu-
        # latest SKU than the build runner). Baseline target keeps the binary
        # portable across runner CPUs; ReleaseSafe keeps overflow + bounds
        # checks so any remaining bug surfaces as a panic with file:line
        # instead of a bare SIGILL.
        run: cd compilers/zig && zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-gnu -Dcpu=baseline
      - uses: actions/upload-artifact@v4
        with:
          name: runar-zig
          path: compilers/zig/zig-out/bin/runar-zig

  java-compiler:
    name: Java Compiler
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Java compiler
        run: cd compilers/java && gradle build --no-daemon
      - name: Java compiler unit tests
        run: cd compilers/java && gradle test --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: runar-java
          path: compilers/java/build/libs/*.jar

  ruby-compiler:
    name: Ruby Compiler
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Ruby compiler unit tests
        run: cd compilers/ruby && rake test
      - name: Ruby compiler conformance (IR -> hex)
        run: |
          fail=0
          for test in conformance/tests/*/expected-ir.json; do
            dir=$(dirname "$test")
            name=$(basename "$dir")
            expected=$(tr -d '[:space:]' < "$dir/expected-script.hex" | tr '[:upper:]' '[:lower:]')
            actual=$(ruby compilers/ruby/bin/runar-compiler-ruby --ir "$test" --hex --disable-constant-folding 2>&1 | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
            if [ "$expected" = "$actual" ]; then
              echo "PASS $name"
            else
              echo "FAIL $name"
              fail=1
            fi
          done
          exit $fail
      # Note: cross-compiler multi-format source conformance lives in the
      # dedicated `conformance` job below, which depends on every
      # compiler-build job and installs every toolchain. Running it here
      # would require this Ruby-only job to also install Go, Rust, Python,
      # Zig, and Java — duplicating ~5 minutes of setup for no extra
      # coverage. Ruby's source.json entries are exercised by the central
      # job alongside every other tier.

  # ---------------------------------------------------------------------------
  # SDKs — package tests + example tests
  # ---------------------------------------------------------------------------

  go-sdk:
    name: Go SDK
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: packages/runar-go/go.sum
      - name: SDK tests
        run: cd packages/runar-go && go test ./...
      - name: Example tests
        run: cd examples/go && go test ./...

  rust-sdk:
    name: Rust SDK
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: SDK tests
        run: cd packages/runar-rs && cargo test
      - name: Example tests
        run: cd examples/rust && cargo test

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - name: SDK tests
        run: cd packages/runar-py && python -m pytest
      - name: Example tests
        run: cd examples/python && PYTHONPATH=../../packages/runar-py python -m pytest

  zig-sdk:
    name: Zig SDK
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: SDK tests
        run: cd packages/runar-zig && zig build test
      - name: Example tests
        run: cd examples/zig && zig build test

  ruby-sdk:
    name: Ruby SDK
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: packages/runar-rb
      - name: SDK tests
        run: cd packages/runar-rb && bundle exec rspec
      - name: Example tests
        run: |
          cd examples/ruby
          bundle install
          bundle exec rspec **/*_spec.rb

  java-sdk:
    name: Java SDK
    runs-on: ubuntu-latest
    needs: lint-no-silent-skips
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: SDK tests
        run: cd packages/runar-java && gradle test --no-daemon
      - name: Example tests
        run: cd examples/java && gradle test --no-daemon
      - name: Build conformance SDK driver
        run: cd conformance/sdk-output/tools/java-driver && gradle fatJar --no-daemon

  # ---------------------------------------------------------------------------
  # Conformance — cross-compiler + SDK output
  # ---------------------------------------------------------------------------

  conformance:
    name: Conformance Tests
    needs: [ts-compiler, go-compiler, rust-compiler, python-compiler, zig-compiler, ruby-compiler, java-compiler]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: runar-go
      - uses: actions/download-artifact@v4
        with:
          name: runar-rust
      - uses: actions/download-artifact@v4
        with:
          name: runar-zig
      - uses: actions/download-artifact@v4
        with:
          name: runar-java
          path: compilers/java/build/libs
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x runar-go runar-compiler-rust runar-zig
      - name: Locate Java compiler jar
        id: java-jar
        run: |
          jar=$(ls compilers/java/build/libs/runar-java-compiler-*.jar | head -1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"
      - name: Run conformance tests
        env:
          JAVA_JAR: ${{ steps.java-jar.outputs.path }}
        run: |
          set -u
          fail=0
          log_dir=$(mktemp -d)

          # Run a single compiler against an IR fixture. Captures stdout to
          # $log_dir/<compiler>.hex and stderr to $log_dir/<compiler>.err.
          # Returns the exit code of the compiler. Empty stdout is allowed at
          # this layer; the caller decides whether emptiness is fatal.
          run_compiler() {
            local compiler="$1"
            local test="$2"
            local out="$log_dir/$compiler.hex"
            local err="$log_dir/$compiler.err"
            : > "$out"
            : > "$err"
            local rc=0
            case "$compiler" in
              go)
                ./runar-go --ir "$test" --hex --disable-constant-folding >"$out" 2>"$err" || rc=$?
                ;;
              rust)
                ./runar-compiler-rust --ir "$test" --hex --disable-constant-folding >"$out" 2>"$err" || rc=$?
                ;;
              zig)
                ./runar-zig compile-ir "$test" --hex >"$out" 2>"$err" || rc=$?
                # zig prints diagnostics on stdout before the hex; keep
                # only the first non-empty line for the comparison.
                head -1 "$out" > "$out.tmp" && mv "$out.tmp" "$out"
                ;;
              ruby)
                ruby compilers/ruby/bin/runar-compiler-ruby --ir "$test" --hex --disable-constant-folding >"$out" 2>"$err" || rc=$?
                ;;
              python)
                ( cd compilers/python && python3 -m runar_compiler --ir "../../$test" --hex --disable-constant-folding ) >"$out" 2>"$err" || rc=$?
                ;;
              java)
                java -jar "$JAVA_JAR" --ir "$test" --hex --disable-constant-folding >"$out" 2>"$err" || rc=$?
                ;;
              *)
                echo "run_compiler: unknown compiler id '$compiler'" >&2
                return 2
                ;;
            esac
            return $rc
          }

          # Print a failure block with the last 50 lines of the compiler's
          # stderr capture so CI logs explain what went wrong.
          dump_failure() {
            local compiler="$1"
            local fixture="$2"
            local rc="$3"
            local reason="$4"
            local err="$log_dir/$compiler.err"
            echo "::error::conformance: $compiler/$fixture failed ($reason, exit=$rc)"
            echo "----- last 50 lines of $compiler stderr for $fixture -----"
            tail -n 50 "$err" 2>/dev/null || true
            echo "----- end stderr -----"
          }

          for test in conformance/tests/*/expected-ir.json; do
            dir=$(dirname "$test")
            name=$(basename "$dir")
            source_json="$dir/source.json"

            # Determine the active compiler set for this fixture. When
            # source.json declares a "compilers" allowlist, intersect it with
            # the non-TS compilers we drive here. Otherwise, every non-TS
            # tier must produce identical output. TS conformance is exercised
            # separately via vitest / the multi-format runner step below.
            all_compilers="go rust zig ruby python java"
            allowlist=""
            if [ -f "$source_json" ]; then
              allowlist=$(jq -r '.compilers // [] | join(" ")' "$source_json")
            fi
            active=""
            if [ -z "$allowlist" ]; then
              active="$all_compilers"
            else
              for c in $all_compilers; do
                for a in $allowlist; do
                  if [ "$c" = "$a" ]; then
                    active="$active $c"
                    break
                  fi
                done
              done
              # Trim leading whitespace.
              active=$(echo "$active" | awk '{$1=$1};1')
            fi

            if [ -z "$active" ]; then
              # Allowlist had no overlap with our 6 non-TS tiers (e.g. ts-only
              # fixture). Skip silently — it's covered by the TS-side runner.
              echo "=== $name === SKIP (no non-TS compilers in allowlist)"
              continue
            fi

            echo -n "=== $name === active=[${active// /,}] "

            # Run every active compiler. Fail loudly on non-zero exit or
            # empty hex output — no more silent passes.
            fixture_failed=0
            for compiler in $active; do
              rc=0
              run_compiler "$compiler" "$test" || rc=$?
              hex=$(tr -d '[:space:]' < "$log_dir/$compiler.hex")
              if [ "$rc" -ne 0 ]; then
                echo
                dump_failure "$compiler" "$name" "$rc" "non-zero exit"
                fail=1
                fixture_failed=1
              elif [ -z "$hex" ]; then
                echo
                dump_failure "$compiler" "$name" "$rc" "empty hex output"
                fail=1
                fixture_failed=1
              fi
              # Persist normalized hex for the comparison phase.
              printf '%s' "$hex" > "$log_dir/$compiler.norm"
            done

            if [ "$fixture_failed" -ne 0 ]; then
              continue
            fi

            # Compare every active compiler against Go (the reference). When
            # Go isn't in the active set, fall back to the first listed
            # compiler as the reference — this keeps allowlists like
            # ["python","ruby"] (none today, but defensive) sensible.
            ref=""
            for compiler in $active; do
              if [ "$compiler" = "go" ]; then
                ref="go"
                break
              fi
            done
            if [ -z "$ref" ]; then
              ref=$(echo "$active" | awk '{print $1}')
            fi
            ref_hex=$(cat "$log_dir/$ref.norm")

            mismatch=0
            for compiler in $active; do
              if [ "$compiler" = "$ref" ]; then
                continue
              fi
              other_hex=$(cat "$log_dir/$compiler.norm")
              if [ "$ref_hex" != "$other_hex" ]; then
                echo
                echo "::error::conformance: $name — $ref hex differs from $compiler hex"
                echo "  $ref:	$ref_hex"
                echo "  $compiler:	$other_hex"
                fail=1
                mismatch=1
              fi
            done

            if [ "$mismatch" -eq 0 ]; then
              echo "OK (${#ref_hex} hex chars, ref=$ref)"
            fi

            # Compare reference output against the golden hex file when
            # present. Mirrors the previous behavior but uses whichever
            # compiler is the comparison reference.
            expected_hex_file="$dir/expected-script.hex"
            if [ -f "$expected_hex_file" ]; then
              expected_hex=$(tr -d '[:space:]' < "$expected_hex_file")
              if [ -n "$expected_hex" ] && [ "$ref_hex" != "$expected_hex" ]; then
                echo "::error::conformance: $name — $ref output does not match golden file"
                echo "  $ref:	$ref_hex"
                echo "  Expected:	$expected_hex"
                fail=1
              fi
            fi
          done
          exit $fail
      # The previous "Ruby format conformance (source -> hex)" step searched for
      # `<case>.runar.rb` files inside each conformance/tests/<case>/ directory,
      # but sources now live under `examples/` and are referenced from
      # `source.json`. The shell loop was a silent no-op. The shared multi-format
      # runner below subsumes it: it reads every source.json entry (TS, Sol,
      # Move, Go, Rust, Python, Zig, Ruby, Java) and drives all 7 compilers.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: compilers/go/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # conformance/ is not a pnpm workspace member (uses npm + package-lock.json
      # for its tsx loader + fast-check fuzzer). The runner spawns subprocesses
      # that import tsx from REPO_ROOT/conformance/node_modules, so install its
      # deps explicitly before the multi-format step.
      - run: cd conformance && npm ci
      - name: Run all-tier parser-only coverage (every compiler × every fixture × every format)
        # Universal frontend coverage: every available compiler runs
        # `--parse-only` on every fixture × every declared format. The
        # per-fixture `compilers` allowlist in source.json is intentionally
        # IGNORED here — that allowlist scopes Stack-IR / hex parity, not
        # the parser layer. This step gates the central claim that "every
        # tier parses every fixture in every one of the nine source
        # formats" (see spec/README.md and conformance/README.md).
        env:
          JAVA_JAR: ${{ steps.java-jar.outputs.path }}
        run: npx tsx conformance/runner/index.ts --tests-dir conformance/tests --parser-only
      - name: Run multi-format source conformance (all 7 compilers, all 9 formats)
        # Adds the TypeScript compiler to the central conformance job (it was
        # previously absent) and exercises every compiler's frontend against
        # every declared source.json entry, not just the IR -> hex path above.
        # Default mode: every compiler runs with `--disable-constant-folding`,
        # matching the fold-off semantics of the checked-in
        # expected-ir.json / expected-script.hex goldens.
        env:
          JAVA_JAR: ${{ steps.java-jar.outputs.path }}
        run: npx tsx conformance/runner/index.ts --tests-dir conformance/tests --multi-format
      - name: Run multi-format source conformance (fold ON, cross-tier parity only)
        # Companion run: every compiler executes with constant folding ENABLED
        # (its end-user default) and the runner enforces cross-tier hex + ANF
        # parity across all 7 tiers, while skipping the golden-file comparison
        # (the checked-in goldens were stamped fold-OFF). This catches latent
        # fold bugs that the historical fold-off-only loop would have missed
        # — see the MEDIUM review finding on "Constant-folding coverage is
        # weaker than runtime coverage". If a real cross-tier divergence
        # appears here in future, list the fixture in
        # `conformance/fold-on-allowlist.json` (with a one-line justification
        # per the file's contract) instead of silently skipping it.
        env:
          JAVA_JAR: ${{ steps.java-jar.outputs.path }}
          RUNAR_DISABLE_CONSTANT_FOLDING: '0'
        run: npx tsx conformance/runner/index.ts --tests-dir conformance/tests --multi-format

  runar-verification:
    name: Runar Verification (Lean 4)
    # Self-contained — only runs `lake build` + Lean tests against the
    # in-repo conformance fixtures. No artifacts consumed from upstream
    # compiler/SDK jobs, so we don't gate it on their (sometimes flaky,
    # sometimes pre-existing) failures.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | bash -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Cache elan and Lake build
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            runar-verification/.lake/build
          key: runar-verification-${{ runner.os }}-${{ hashFiles('runar-verification/lean-toolchain', 'runar-verification/lakefile.lean', 'runar-verification/lake-manifest.json') }}
          restore-keys: |
            runar-verification-${{ runner.os }}-
      - name: Build (lean lib + test exes)
        working-directory: runar-verification
        run: lake build && lake build pipelineGolden goldenLoad roundtrip
      - name: Verify all 49 fixtures parse + satisfy WF
        working-directory: runar-verification
        run: lake env ./.lake/build/bin/goldenLoad
      - name: Verify all 49 fixtures round-trip through ANF JSON
        working-directory: runar-verification
        run: lake env ./.lake/build/bin/roundtrip
      - name: Verify byte-exact regression gate (>= 33/49 fixtures)
        id: byte-exact-gate
        working-directory: runar-verification
        # The pipelineGolden binary enforces three regression gates and
        # exits nonzero on any:
        #   1. Total byte-exact count must not drop below 33.
        #   2. Every baseline fixture (33 names) must still produce
        #      byte-identical hex against the TS reference.
        #   3. Notice (non-fatal) for fixtures that have flipped to
        #      byte-exact and should be promoted into baselineMatches.
        # Linux has no dyld __DATA_CONST check, so the native exe runs
        # directly here (it cannot run locally on macOS — see HANDOFF §6).
        # Native is ~50-100x faster than the interpreter; the multi-MB
        # cryptoAxiomPending fixtures (post-quantum-slhdsa, p384-*,
        # ec-demo, schnorr-zkp) are skipped by default — see
        # `RUNAR_VERIFICATION_FULL=1` opt-in in HANDOFF section 25.
        # The captured output is parsed via shell-only substitution
        # (no GitHub event inputs are interpolated into shell).
        run: |
          set -o pipefail
          lake env ./.lake/build/bin/pipelineGolden | tee /tmp/pgolden.out
          line=$(grep -E '^PIPELINE GOLDEN:' /tmp/pgolden.out | tail -n1)
          count=${line#PIPELINE GOLDEN: }
          echo "byte_exact=${count}" >> "$GITHUB_OUTPUT"
      - name: Emit verification step summary
        if: always()
        env:
          # Internal output from previous step — produced entirely by
          # tools in this repo, never by user-controlled GitHub event
          # data. Quoted via env: per workflow-injection guidelines.
          BYTE_EXACT: ${{ steps.byte-exact-gate.outputs.byte_exact }}
        run: |
          {
            printf '## Rúnar Lean 4 Verification\n\n'
            printf '| Check | Result |\n'
            printf '|-------|--------|\n'
            printf '| Parse + WF | 49/49 |\n'
            printf '| ANF JSON round-trip | 49/49 |\n'
            if [ -n "${BYTE_EXACT:-}" ]; then
              printf '| Byte-exact vs. TS reference | %s |\n' "$BYTE_EXACT"
            else
              printf '| Byte-exact vs. TS reference | (binary did not run) |\n'
            fi
            printf '\n'
            printf 'Trust manifest: see `runar-verification/TRUST_MANIFEST.md`\n'
            printf 'Phase history: see `runar-verification/HANDOFF.md`\n'
          } >> "$GITHUB_STEP_SUMMARY"

  sdk-conformance:
    name: SDK Output Conformance
    needs: [ts-compiler, go-sdk, rust-sdk, python-sdk, zig-sdk, ruby-sdk, java-sdk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: packages/runar-go/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: packages/runar-rb
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Build Rust SDK tool
        run: cd conformance/sdk-output/tools/rs-sdk-tool && cargo build --release
      - name: Build Zig SDK tool
        run: cd conformance/sdk-output/tools/zig-sdk-tool && zig build -Doptimize=ReleaseFast
      - name: Build Java SDK driver
        run: cd conformance/sdk-output/tools/java-driver && gradle fatJar --no-daemon
      - name: Run SDK output conformance (all contracts x 7 SDKs)
        run: cd conformance/sdk-output && npx tsx runner/sdk-runner.ts

  # ---------------------------------------------------------------------------
  # Integration — regtest node tests
  # ---------------------------------------------------------------------------

  integration:
    name: Integration Tests
    needs:
      - ts-compiler
      - go-compiler
      - go-sdk
      - rust-compiler
      - rust-sdk
      - python-compiler
      - python-sdk
      - zig-compiler
      - zig-sdk
      - ruby-compiler
      - ruby-sdk
      - java-compiler
      - java-sdk
    runs-on: ubuntu-latest
    env:
      RPC_URL: http://localhost:18332
      RPC_USER: regtest
      RPC_PASS: regtest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: compilers/go/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest bsv-sdk
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: integration/ruby
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Java integration's ContractCompiler spawns `node --import tsx`; tsx
      # lives in conformance/ (not pnpm-workspace), so install it explicitly.
      - run: cd conformance && npm ci

      - name: Pre-create regtest node config with test credentials
        run: |
          mkdir -p integration/regtest-data/n1
          printf '%s\n' \
            'port=18333' 'rpcbind=0.0.0.0' 'rpcport=18332' \
            'rpcuser=regtest' 'rpcpassword=regtest' 'rpcallowip=0.0.0.0/0' \
            'dnsseed=0' 'listenonion=0' 'listen=1' 'server=1' 'rest=1' 'regtest=1' \
            'usecashaddr=0' 'txindex=1' 'excessiveblocksize=1000000000' \
            'maxstackmemoryusageconsensus=100000000' 'maxscriptsizepolicy=0' \
            'maxscriptnumlengthpolicy=0' 'maxstackmemoryusagepolicy=100000000' \
            'maxtxsizepolicy=0' 'genesisactivationheight=1' 'chronicleactivationheight=1' \
            'minminingtxfee=0.00000001' \
            > integration/regtest-data/n1/bitcoin.conf

      - name: Start BSV regtest node
        run: cd integration && ./regtest.sh start

      - name: Go integration tests
        # Timeout raised to 30min because TestRollupGroth16WAMSM_AdvanceState
        # broadcasts a ~900KB Groth16 MSM tx and regularly spends 10+ minutes
        # in the RPC round-trip on the CI runner. Runs comfortably in <1min
        # locally when the node is not under memory pressure.
        run: cd integration/go && go test -tags integration -v -timeout 1800s
        timeout-minutes: 35

      - name: TypeScript integration tests
        run: cd integration/ts && npx vitest run

      - name: Rust integration tests
        run: cd integration/rust && cargo test --release -- --ignored
        timeout-minutes: 10

      - name: Python integration tests
        run: cd integration/python && PYTHONPATH=../../compilers/python:../../packages/runar-py pytest -v

      - name: Ruby integration tests
        run: cd integration/ruby && bundle exec rspec --format documentation

      - name: Zig integration tests
        run: cd integration/zig && zig build test
        timeout-minutes: 5

      - name: Java integration tests
        run: cd integration/java && gradle test -Drunar.integration=true --no-daemon
        timeout-minutes: 35

      - name: Install end-to-end Ruby deps
        run: cd examples/end2end-example/ruby && bundle install

      - name: All end-to-end PriceBet examples
        run: pnpm run e2e:all

      - name: Stop regtest node
        if: always()
        run: cd integration && ./regtest.sh stop
