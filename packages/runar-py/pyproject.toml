[project]
name = "runar"
version = "0.5.0"
description = "Runar - TypeScript-to-Bitcoin Script Compiler (Python runtime)"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
crypto = ["coincurve>=20.0"]
dev = ["pytest>=7.0"]
# Off-chain Bitcoin Script VM (runar.sdk.script_vm) wraps the bsv-blockchain
# bsv-sdk Spend interpreter. Optional — runar-py itself stays zero-dependency.
script-vm = ["bsv-sdk>=1.0"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["runar*"]
